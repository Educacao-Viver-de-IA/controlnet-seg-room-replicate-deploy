build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "diffusers>=0.27.0"
    - "transformers>=4.51.0"
    - "accelerate>=1.0.0"
    - "huggingface_hub>=0.24.0"
    - "pillow>=10.0.0"
    - "numpy>=1.26.0"
    - "safetensors>=0.4.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  run:
    - command: python -c "import os; os.environ['HF_TOKEN']=open('/run/secrets/HF_TOKEN').read().strip(); from huggingface_hub import snapshot_download; [snapshot_download(repo_id=r, local_dir=f'/src/weights/{r.split(\"/\")[-1]}', token=os.environ['HF_TOKEN']) for r in ['BertChristiaens/controlnet-seg-room', 'runwayml/stable-diffusion-v1-5']]"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
